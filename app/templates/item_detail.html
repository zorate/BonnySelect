{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto py-16">
<img src="{{ url_for('static', filename=product.image) }}" class="rounded-xl mb-6">
<h1 class="text-2xl font-bold">{{ product.title }}</h1>
<p class="text-gray-600 mb-4">₦{{ product.price }}</p>
<p class="mb-6">{{ product.description }}</p>

<form method="POST" action="{{ url_for('public.order', product_id=product._id) }}">
<input name="full_name" required placeholder="Full Name" class="w-full border p-3 mb-3 rounded-lg">
<input name="whatsapp" required placeholder="WhatsApp Number" class="w-full border p-3 mb-3 rounded-lg">

<select name="location" class="w-full border p-3 mb-4 rounded-lg">
<option>RA</option>
<option>Finima</option>
<option>Town</option>
</select>

<button class="w-full bg-black text-white py-3 rounded-xl">
Confirm Delivery (Pay on Delivery)
</button>
</form>
</div>

{% endblock %}
