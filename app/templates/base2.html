<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- PWA Meta Tags (Updated) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bonny Selects">
    <meta name="theme-color" content="#0a0a0a">
    
    <!-- Manifest and Favicons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/static/favicon/favicon-64x64.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="apple-touch-icon" href="/static/favicon/apple-touch-icon.png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/static/icons/icon-180x180.png">
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512x512.png">
    
    <!-- Windows Tile -->
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="msapplication-TileImage" content="/static/icons/icon-144x144.png">
    
    <!-- Production CSS (Replace Tailwind CDN with local CSS) -->
    <!-- Option 1: If using Tailwind locally (recommended) -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Option 2: If using custom CSS -->
    <!-- <link rel="stylesheet" href="/static/css/custom.css"> -->
    
    <title>{% block title %}Bonny Selects{% endblock %}</title>
    
    <style>
        /* Basic reset and defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
        }
        
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
            color: #0a0a0a;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-white text-gray-900">

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="fixed top-4 right-4 bg-black text-white px-4 py-2 rounded-lg">
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}
    
    <!-- Service Worker Registration -->
    <script>
        // Register service worker for offline support and caching
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => {
                console.log('Service worker registration failed:', err);
            });
        }
        
        // Handle PWA install prompt properly
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event for later use
            deferredPrompt = e;
            
            // Optional: Show your own install button/banner
            // Uncomment if you want to implement custom install button:
            
            const installButton = document.getElementById('install-button');
            if (installButton) {
                installButton.style.display = 'block';
                installButton.addEventListener('click', async () => {
                    if (!deferredPrompt) {
                        return;
                    }
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response to the install prompt: ${outcome}`);
                    deferredPrompt = null;
                });
            }
            
        });
        
        // Handle app installed
        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            deferredPrompt = null;
        });
        
        // Prevent pinch zoom
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
        
        // Prevent double-tap zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
{% block content %}{% endblock %}

 <footer>
    <p> Contact us for more enquires</p>

</body>
</html>
